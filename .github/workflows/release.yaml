name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (commit SHA or version tag)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kalink-studio/stephaniegiorgis

jobs:
  deploy-production:
    name: Deploy to Production
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'changeset-release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Get version from package
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get commit SHA for release
        id: sha
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short=7 "$COMMIT_SHA")
          echo "short=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "full=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for source image
        run: |
          SOURCE_TAG="${{ steps.sha.outputs.short }}"
          for attempt in {1..20}; do
            if docker manifest inspect "${{ env.IMAGE_NAME }}:$SOURCE_TAG" > /dev/null 2>&1; then
              echo "Found source image ${{ env.IMAGE_NAME }}:$SOURCE_TAG"
              exit 0
            fi

            echo "Waiting for source image ${{ env.IMAGE_NAME }}:$SOURCE_TAG (attempt $attempt/20)"
            sleep 15
          done

          echo "Source image not found after waiting: ${{ env.IMAGE_NAME }}:$SOURCE_TAG"
          exit 1

      - name: Re-tag image with version
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }} ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}

      - name: Update production kustomization
        run: |
          sed -i "s|newTag: .*|newTag: ${{ steps.version.outputs.tag }}|" k8s/overlays/production/kustomization.yaml

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s/overlays/production/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No production kustomization change to commit"
            exit 0
          fi
          git commit -m "chore(production): deploy ${{ steps.version.outputs.tag }}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

  manual-deploy:
    name: Manual Deploy
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update kustomization
        run: |
          sed -i "s|newTag: .*|newTag: ${{ inputs.image_tag }}|" k8s/overlays/${{ inputs.environment }}/kustomization.yaml

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s/overlays/${{ inputs.environment }}/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No kustomization change to commit"
            exit 0
          fi
          git commit -m "chore(${{ inputs.environment }}): deploy ${{ inputs.image_tag }} [manual]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
